name: tests
on:
  push: 
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: pipx install uv

      - name: Run tests
        run: uv run pytest --cov=acc_lcsh_check/

      - name: Send report to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          fail-on-error: false                    
          github-token: ${{ secrets.GITHUB_TOKEN}}